<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>🚀 Quick Tool</h1>

    <div class="section">
      <h2>Current Page Info</h2>
      <div id="pageInfo" class="info-box">
        <p><strong>URL:</strong> <span id="currentUrl">-</span></p>
        <p><strong>Title:</strong> <span id="currentTitle">-</span></p>
      </div>
    </div>

    <div class="section">
      <h2>Quick Actions</h2>
      <button id="extractText" class="btn btn-primary">Extract All Text</button>
      <button id="extractLinks" class="btn btn-secondary">Extract All Links</button>
      <button id="highlightKeywords" class="btn btn-accent">Highlight Keywords</button>
    </div>

    <div class="section">
      <h2>Results</h2>
      <div id="results" class="results-box">
        Click a button above to see results...
      </div>
    </div>

    <div class="footer">
      <p>Built with Claude 💙</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
