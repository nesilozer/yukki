<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
['c16','c48','c128'].forEach(id => {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const s = c.width;
  const g = ctx.createLinearGradient(0,0,s,s);
  g.addColorStop(0,'#667eea');
  g.addColorStop(1,'#764ba2');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,s,s);
  ctx.fillStyle = 'white';
  ctx.font = `bold ${s*0.6}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Q',s/2,s/2);
  const link = document.createElement('a');
  link.download = id.replace('c','icon')+'.png';
  link.href = c.toDataURL();
  link.click();
});
</script>
</body>
</html>
